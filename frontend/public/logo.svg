<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&amp;display=swap');
    </style>
  </defs>
  
  <!-- Main COHT Box -->
  <rect x="0" y="0" width="400" height="75" rx="4" ry="4" fill="#1E664E" />
  
  <!-- Vertical Separators -->
  <line x1="90" y1="12" x2="90" y2="63" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="185" y1="12" x2="185" y2="63" stroke="#FFFFFF" stroke-width="1.5" />
  <line x1="280" y1="12" x2="280" y2="63" stroke="#FFFFFF" stroke-width="1.5" />
  
  <!-- COHT Letters -->
  <text x="45" y="52" font-family="'Cinzel', 'Times New Roman', serif" font-size="42" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">C</text>
  <text x="138" y="52" font-family="'Cinzel', 'Times New Roman', serif" font-size="42" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">O</text>
  <text x="232" y="52" font-family="'Cinzel', 'Times New Roman', serif" font-size="42" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">H</text>
  <text x="335" y="52" font-family="'Cinzel', 'Times New Roman', serif" font-size="42" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">T</text>
  
  <!-- Tagline -->
  <text x="200" y="105" font-family="'Cinzel', 'Times New Roman', serif" font-size="16" font-weight="600" fill="#333333" text-anchor="middle" letter-spacing="2">Centre of Healthcare Training</text>
</svg>
